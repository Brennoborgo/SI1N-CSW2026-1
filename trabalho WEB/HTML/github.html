<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Meu GitHub - Brenno</title>
    <style>
        /* MESMO ESTILO DA PÁGINA ANTERIOR */
        body {
            font-family: sans-serif;
            background-color: #e6e6e6; /* Cinza claro */
            color: #333;
            padding: 30px;
            text-align: center; /* Centraliza o conteúdo para dar destaque */
        }

        h1 {
            color: darkblue;
        }

        p {
            max-width: 600px;
            margin: 20px auto; /* Centraliza o bloco de texto */
            line-height: 1.5;
        }

        img {
            width: 300px;
            border: 2px solid black;
            border-radius: 10px; /* Deixa as pontas da imagem arredondadas */
            margin-bottom: 20px;
        }

        /* Estilo do link como um botão simples */
        a {
            display: inline-block;
            background-color: darkblue;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid black;
        }

        a:hover {
            background-color: blue; /* Muda a cor ao passar o mouse */
        }
    </style>
</head>
<body>

    <h1>Meu GitHub</h1>
    <img src="../img/GitHub.jpg" alt="github">

    <p>
        Acesse meu GitHub para conhecer meus projetos, atividades acadêmicas e evoluções na área de tecnologia. 
        Lá você encontrará trabalhos desenvolvidos durante minha formação em Sistemas de Informação.
    </p>

        Meus Trabalhos </a>

</body>
</html>
