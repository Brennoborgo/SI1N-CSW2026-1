<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Orçamento - Brenno</title>
    <style>
        /* MANTENDO O MESMO ESTILO RAIZ */
        body {
            font-family: sans-serif;
            background-color: #e6e6e6;
            color: #333;
            padding: 30px;
        }

        h1 { color: darkblue; }

        form {
            background-color: white;
            padding: 20px;
            border: 1px solid black;
            max-width: 500px;
        }

        /* Organizando os campos um embaixo do outro */
        div {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input[type="text"], 
        input[type="email"], 
        input[type="tel"], 
        select, 
        textarea {
            width: 95%;
            padding: 8px;
        }

        button {
            background-color: darkblue;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: blue;
        }
    </style>
</head>
<body>

    <h1>Solicitar Orçamento</h1>
    <p>Preencha os dados abaixo para que eu possa entrar em contato.</p>

    <form action="#" method="post">
        
        <div>
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome aqui" required>
        </div>

        <div>
            <label for="fone">Telefone:</label>
            <input type="tel" id="fone" name="fone" placeholder="(27) 99999-9999">
        </div>

        <div>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div>
            <label>Tipo de Cliente:</label>
            <input type="radio" id="pf" name="tipo_pessoa" value="fisica">
            <label style="display:inline;" for="pf">Pessoa Física</label>
            
            <input type="radio" id="pj" name="tipo_pessoa" value="juridica">
            <label style="display:inline;" for="pj">Pessoa Jurídica</label>
        </div>

        <div>
            <label for="horario">Melhor horário para contato:</label>
            <select id="horario" name="horario">
                <option value="manha">Manhã (08:00 às 12:00)</option>
                <option value="tarde">Tarde (13:00 às 18:00)</option>
                <option value="noite">Noite (19:00 às 22:00)</option>
            </select>
        </div>

        <div>
            <label>Tipo de serviço que deseja:</label>
            <input type="checkbox" id="serv1" name="servico" value="web">
            <label style="display:inline;" for="serv1">Criação de Site</label><br>
            
            <input type="checkbox" id="serv2" name="servico" value="manutencao">
            <label style="display:inline;" for="serv2">Manutenção</label><br>
            
            <input type="checkbox" id="serv3" name="servico" value="banco">
            <label style="display:inline;" for="serv3">Banco de Dados</label>
        </div>

        <div>
            <label for="mensagem">Breve descrição do que deseja:</label>
            <textarea id="mensagem" name="mensagem" rows="4" placeholder="Descreva seu projeto..."></textarea>
        </div>

        <button type="submit">Enviar Pedido</button>

    </form>

    <br>
    <a href="../index.html">Voltar ao Inicio </a>
    

</body>
</html>
